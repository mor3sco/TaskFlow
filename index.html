<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div id="loginScreen">
    <div class="login-card">
      <div class="login-logo">Task<span>Flow</span></div>
      <div class="login-sub" id="loginSub">Entre para organizar suas tarefas diárias</div>
      <div id="googleSignInBtn" class="google-btn-wrap"></div>
      <div class="divider"><span>ou</span></div>
      <div class="field">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="field" id="usernameField" style="display:none;">
        <label for="loginUsername">Nome de usuário</label>
        <input type="text" id="loginUsername" placeholder="como quer ser chamado">
      </div>
      <div class="field">
        <label for="loginPass">Senha</label>
        <input type="password" id="loginPass" placeholder="mínimo 6 caracteres" autocomplete="current-password">
      </div>
      <div class="err" id="loginErr"></div>
      <button class="btn btn-primary" id="loginBtn">Entrar</button>
      <div class="login-toggle">
        <span id="toggleText">Ainda não tem conta?</span>
        <a id="toggleLink">Criar conta</a>
      </div>
    </div>
  </div>

  <div id="appScreen">
    <div class="topbar">
      <div class="brand">Task<span>Flow</span></div>
      <div class="user-pill">
        <img class="avatar-img" id="avatarImg" src="" alt="" style="display:none;">
        <div class="avatar" id="avatarLetter">U</div>
        <span id="userLabel">usuário</span>
        <button class="logout-btn" id="logoutBtn">Sair</button>
      </div>
    </div>
    <div class="date-nav">
      <button class="nav-btn" id="prevDay">&#8249;</button>
      <div class="date-label" id="dateLabel">—<small id="dateSub"></small></div>
      <button class="nav-btn" id="nextDay">&#8250;</button>
      <button class="today-btn" id="todayBtn">Ir para hoje</button>
    </div>
    <div class="carry-banner" id="carryBanner" style="display:none;">
      <span id="carryText"></span>
      <button id="carryBtn">Trazer para hoje</button>
    </div>
    <div class="add-task-bar">
      <input type="text" id="newTaskInput" placeholder="Nova tarefa para este dia... (Enter para adicionar)">
      <select id="newTaskPriority">
        <option value="MEDIA">Prioridade média</option>
        <option value="ALTA">Prioridade alta</option>
        <option value="BAIXA">Prioridade baixa</option>
      </select>
      <button class="add-btn" id="addTaskBtn">Adicionar</button>
    </div>
    <div class="board">
      <div class="column" data-status="TODO" id="col-TODO">
        <div class="column-head">
          <div class="column-title"><span class="dot todo"></span>A Fazer</div>
          <div class="count" id="count-TODO">0</div>
        </div>
        <div class="cards" id="cards-TODO"></div>
      </div>
      <div class="column" data-status="DOING" id="col-DOING">
        <div class="column-head">
          <div class="column-title"><span class="dot doing"></span>Em Andamento</div>
          <div class="count" id="count-DOING">0</div>
        </div>
        <div class="cards" id="cards-DOING"></div>
      </div>
      <div class="column" data-status="DONE" id="col-DONE">
        <div class="column-head">
          <div class="column-title"><span class="dot done"></span>Concluído</div>
          <div class="count" id="count-DONE">0</div>
        </div>
        <div class="cards" id="cards-DONE"></div>
      </div>
    </div>
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-brand">Task<span>Flow</span></div>
        <p class="footer-desc">
          Desenvolvido por
          <a href="https://github.com/mor3sco" target="_blank" rel="noopener">Evandro Moresco</a>
          &nbsp;·&nbsp;
          <a href="https://oggisec.com" target="_blank" rel="noopener">Oggi Sec</a>
          — Segurança &amp; TI
        </p>
        <p class="footer-copy">© <span id="footerYear"></span> Tutti i diritti riservati</p>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
